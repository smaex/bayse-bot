services:
  - type: web
    name: bayse-bot
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /ping

    envVars:
      # Required — set these in the Render dashboard
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
        # Generate with:
        # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"

      # Optional — enables NEWS strategy (free at newsapi.org)
      - key: NEWSAPI_KEY
        sync: false

      # Supabase PostgreSQL — add your connection string in the Render dashboard
      - key: DATABASE_URL
        sync: false

      # Render sets RENDER_EXTERNAL_URL automatically — the bot uses it for self-ping
      - key: PYTHON_VERSION
        value: "3.11.0"
