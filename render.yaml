services:
  - type: web
    name: bayse-bot
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /ping

    # Persistent disk — keeps the user database across every deploy.
    # Without this, users must reconnect after every push.
    disk:
      name: bayse-data
      mountPath: /data
      sizeGB: 1

    envVars:
      # Required — set these in the Render dashboard
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
        # Generate with:
        # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"

      # Optional — enables NEWS strategy (free at newsapi.org)
      - key: NEWSAPI_KEY
        sync: false

      # Points the database at the persistent disk mount
      - key: DATA_DIR
        value: /data

      # Render sets RENDER_EXTERNAL_URL automatically — the bot uses it for self-ping
      - key: PYTHON_VERSION
        value: "3.11.0"
