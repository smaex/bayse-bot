name: Deploy to VPS

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy & restart bot
      uses: appleboy/ssh-action@v1.0.3
      with:
        host:     ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key:      ${{ secrets.VPS_SSH_KEY }}
        port:     ${{ secrets.VPS_PORT }}
        script: |
          set -e

          BOT_DIR="/opt/bayse-bot"
          SERVICE="bayse-bot"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Step 1 — Hard kill any ghost instances"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Stop the systemd service first
          sudo systemctl stop $SERVICE 2>/dev/null || true

          # Kill any stray bot.py processes that survived
          pkill -9 -f "python.*bot\.py" 2>/dev/null || true
          sleep 3

          # Confirm nothing is left
          if pgrep -f "bot\.py" > /dev/null; then
            echo "ERROR: bot.py process still alive after kill attempt"
            pgrep -a -f "bot\.py"
            exit 1
          fi
          echo "✅ All old instances stopped"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Step 2 — Pull latest code"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cd $BOT_DIR
          git fetch --all
          git reset --hard origin/main 2>/dev/null || git reset --hard origin/master
          echo "✅ Code updated"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Step 3 — Install/update dependencies"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          $BOT_DIR/.venv/bin/pip install --quiet -r $BOT_DIR/requirements.txt
          echo "✅ Dependencies installed"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Step 4 — Start bot fresh"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          sudo systemctl start $SERVICE
          sleep 8

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Step 5 — Verify it started correctly"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if sudo systemctl is-active --quiet $SERVICE; then
            echo "✅ $SERVICE is running"
          else
            echo "❌ $SERVICE failed to start — showing last 30 lines of logs:"
            sudo journalctl -u $SERVICE -n 30 --no-pager
            exit 1
          fi

          # Count running bot processes — should be exactly 1
          COUNT=$(pgrep -c -f "python.*bot\.py" || true)
          if [ "$COUNT" -eq 1 ]; then
            echo "✅ Exactly 1 bot instance running (no ghosts)"
          elif [ "$COUNT" -gt 1 ]; then
            echo "⚠️  WARNING: $COUNT bot instances detected — killing extras"
            # Keep the newest, kill the rest
            pgrep -f "python.*bot\.py" | head -n -1 | xargs kill -9 2>/dev/null || true
          else
            echo "❌ No bot process found after start"
            exit 1
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deploy complete"
          echo "  Service: $SERVICE"
          echo "  Instances running: $(pgrep -c -f 'python.*bot\.py' || echo 0)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Notify Telegram on success
      if: success()
      uses: appleboy/telegram-action@master
      with:
        to:      ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
        token:   ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ✅ *Bayse Bot deployed*
          Branch: `${{ github.ref_name }}`
          Commit: `${{ github.event.head_commit.message }}`
          By: ${{ github.actor }}

    - name: Notify Telegram on failure
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to:    ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ *Bayse Bot deploy FAILED*
          Branch: `${{ github.ref_name }}`
          Commit: `${{ github.event.head_commit.message }}`
          Check GitHub Actions for the error log.
